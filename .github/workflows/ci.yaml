name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Format Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dev dependencies
        run: uv sync

      - name: Run ruff linter
        run: uv run ruff check src/ tests/

      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Job 2: Static Type Checking
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dev dependencies
        run: uv sync

      - name: Run mypy
        run: uv run mypy src/castor/

  # ---------------------------------------------------------------------------
  # Job 3: Unit & Integration Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install all dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=src/castor --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 4: Docker Build Validation
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: castor:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

